<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Civil War: Realistic Front</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Times New Roman', serif; background: #000; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; }
        #menu { 
            position: absolute; width: 100%; height: 100%; pointer-events: all;
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        .hud-element { position: absolute; padding: 20px; text-shadow: 2px 2px #000; }
        #health-ui { bottom: 0; left: 0; font-size: 24px; color: #ff4d4d; }
        #ammo-ui { bottom: 0; right: 0; font-size: 24px; color: #ffd700; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
        }
        button { 
            background: #4a3728; color: #f2e8cf; border: 2px solid #8b5e34; 
            padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 10px;
        }
        button:hover { background: #6b4f3a; }
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; display: flex; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading-screen"><h1>CARGANDO BATALLÓN...</h1></div>

    <div id="ui">
        <div id="menu">
            <h1>BATTLE OF 1861</h1>
            <button onclick="start()">ENTRAR EN COMBATE</button>
            <p>Usa WASD para moverte y CLICK para disparar.</p>
        </div>
        <div id="health-ui" class="hud-element">SALUD: 100%</div>
        <div id="ammo-ui" class="hud-element">FUSIL: CARGADO</div>
        <div id="crosshair"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        let scene, camera, renderer, controls, loader;
        let player = { hp: 100, canShoot: true };
        let enemies = [];
        const clock = new THREE.Clock();

        // URLs de recursos (Modelos reales de Three.js)
        const SOLDIER_URL = 'https://threejs.org/examples/models/gltf/Soldier.glb';

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.7; // Altura de los ojos

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 1. ENTORNO: CIELO REALISTA
            const sky = new Sky();
            sky.scale.setScalar(450000);
            scene.add(sky);
            const sun = new THREE.Vector3();
            sun.setFromSphericalCoords(1, Math.PI / 2.2, Math.PI / 4);
            sky.material.uniforms['sunPosition'].value.copy(sun);

            // 2. ENTORNO: SUELO Y VEGETACIÓN
            const texLoader = new THREE.TextureLoader();
            const grassTex = texLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
            grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
            grassTex.repeat.set(100, 100);

            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshStandardMaterial({ map: grassTex })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 3. ILUMINACIÓN
            const light = new THREE.DirectionalLight(0xffffff, 2);
            light.position.set(10, 50, 10);
            light.castShadow = true;
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 1));

            // 4. CARGA DE MODELOS
            loader = new GLTFLoader();
            
            // Ocultar pantalla de carga al iniciar
            document.getElementById('loading-screen').style.display = 'none';

            controls = new PointerLockControls(camera, document.body);
            setupInput();
            animate();
        }

        window.start = function() {
            controls.lock();
            document.getElementById('menu').style.display = 'none';
            spawnWave();
        };

        function spawnWave() {
            for(let i=0; i<5; i++) {
                loader.load(SOLDIER_URL, (gltf) => {
                    const soldier = gltf.scene;
                    soldier.scale.set(1, 1, 1);
                    soldier.position.set(Math.random()*40-20, 0, -20 - Math.random()*20);
                    soldier.traverse(child => { if(child.isMesh) child.castShadow = true; });
                    
                    // Animación básica (Si el modelo tiene)
                    const mixer = new THREE.AnimationMixer(soldier);
                    const action = mixer.clipAction(gltf.animations[1]); // Índice 1 suele ser 'Walk'
                    action.play();

                    scene.add(soldier);
                    enemies.push({ mesh: soldier, mixer: mixer, hp: 100 });
                });
            }
        }

        function shoot() {
            if(!player.canShoot) return;
            player.canShoot = false;
            document.getElementById('ammo-ui').innerText = "FUSIL: RECARGANDO...";

            // Raycast para impacto
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(), camera);
            const intersects = ray.intersectObjects(enemies.map(e => e.mesh), true);

            if(intersects.length > 0) {
                // Encontrar a qué enemigo pertenece el objeto impactado
                let hitObject = intersects[0].object;
                while(hitObject.parent && !enemies.find(e => e.mesh === hitObject)) {
                    hitObject = hitObject.parent;
                }
                
                const enemyIndex = enemies.findIndex(e => e.mesh === hitObject);
                if(enemyIndex !== -1) {
                    scene.remove(enemies[enemyIndex].mesh);
                    enemies.splice(enemyIndex, 1);
                    if(enemies.length === 0) spawnWave();
                }
            }

            setTimeout(() => {
                player.canShoot = true;
                document.getElementById('ammo-ui').innerText = "FUSIL: CARGADO";
            }, 3000);
        }

        let moveF = false, moveB = false, moveL = false, moveR = false;
        function setupInput() {
            document.addEventListener('keydown', (e) => {
                if(e.code === 'KeyW') moveF = true;
                if(e.code === 'KeyS') moveB = true;
                if(e.code === 'KeyA') moveL = true;
                if(e.code === 'KeyD') moveR = true;
            });
            document.addEventListener('keyup', (e) => {
                if(e.code === 'KeyW') moveF = false;
                if(e.code === 'KeyS') moveB = false;
                if(e.code === 'KeyA') moveL = false;
                if(e.code === 'KeyD') moveR = false;
            });
            document.addEventListener('mousedown', shoot);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if(controls.isLocked) {
                const speed = 15 * delta;
                if(moveF) controls.moveForward(speed);
                if(moveB) controls.moveForward(-speed);
                if(moveL) controls.moveRight(-speed);
                if(moveR) controls.moveRight(speed);

                enemies.forEach(en => {
                    if(en.mixer) en.mixer.update(delta);
                    // IA: Los soldados caminan hacia ti
                    const dir = new THREE.Vector3().subVectors(camera.position, en.mesh.position).normalize();
                    en.mesh.position.addScaledVector(dir, 0.04);
                    en.mesh.lookAt(camera.position.x, 0, camera.position.z);
                    
                    if(en.mesh.position.distanceTo(camera.position) < 1.5) {
                        player.hp -= 0.1;
                        document.getElementById('health-ui').innerText = `SALUD: ${Math.ceil(player.hp)}%`;
                        if(player.hp <= 0) location.reload();
                    }
                });
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
