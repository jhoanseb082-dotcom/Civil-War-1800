<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil War: Educational Battlefront</title>
    <style>
        :root { --accent: #8b5e34; --bg: #2b1d12; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; }
        
        /* Capas de Interfaz */
        #ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; color: #f2e8cf; }
        .overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
        
        /* Menú Principal */
        #main-menu { width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10; }
        #main-menu h1 { font-size: 4rem; text-shadow: 0 0 20px #8b5e34; margin-bottom: 5px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        button { 
            padding: 15px 50px; font-size: 1.2rem; cursor: pointer; background: var(--accent); 
            color: white; border: 2px solid #f2e8cf; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #a47148; transform: scale(1.05); }

        /* HUD */
        #hud { position: absolute; bottom: 0; width: 100%; display: none; padding: 20px; box-sizing: border-box; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 15px; border-left: 5px solid var(--accent); margin-bottom: 10px; width: fit-content; }
        #hp-bar-outer { width: 200px; height: 15px; background: #444; margin-top: 5px; }
        #hp-bar-inner { width: 100%; height: 100%; background: #c1121f; transition: 0.3s; }
        
        #mission-card { position: absolute; top: 20px; right: 20px; text-align: right; }
        #reloading-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; color: gold; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }

        /* Pantallas de Estado */
        #screen-msg { display: none; background: rgba(0,0,0,0.9); z-index: 20; width: 100%; height: 100%; text-align: center; }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="main-menu" class="overlay">
        <h1>CIVIL WAR 1861</h1>
        <p>Experiencia Educativa de Inmersión Histórica</p>
        <div class="btn-group">
            <button onclick="gameState.init(false)">Nueva Partida</button>
            <button onclick="gameState.init(true)">Continuar Partida</button>
            <button onclick="alert('Programado por J. Sebastian Rincón\nUso pedagógico.')">Créditos</button>
        </div>
    </div>

    <div id="hud">
        <div id="mission-card">
            <h2 id="mission-title">Misión 1: Entrenamiento</h2>
            <p id="mission-desc">Objetivos: 0 / 5</p>
        </div>
        <div class="stat-box">
            SALUD
            <div id="hp-bar-outer"><div id="hp-bar-inner"></div></div>
        </div>
        <div class="stat-box">
            MUNICIÓN: <span id="ammo-count">1 / 1</span>
        </div>
        <div id="crosshair"></div>
        <div id="reloading-indicator">RECARGANDO...</div>
    </div>

    <div id="screen-msg" class="overlay">
        <h1 id="status-text">VICTORIA</h1>
        <button onclick="location.reload()">Regresar al Menú</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // --- CONFIGURACIÓN Y ESTADO ---
    const gameState = {
        mission: 1,
        hp: 100,
        enemiesKilled: 0,
        isPaused: true,
        ammo: 1,
        side: 'union',
        
        init(loadSaved) {
            if(loadSaved) {
                const saved = JSON.parse(localStorage.getItem('civilWarSave'));
                if(saved) {
                    this.mission = saved.mission;
                    this.hp = saved.hp;
                }
            }
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            controls.lock();
            this.isPaused = false;
            setupMission();
            startAudio();
        },

        save() {
            localStorage.setItem('civilWarSave', JSON.stringify({mission: this.mission, hp: this.hp}));
        },

        die() {
            this.isPaused = true;
            controls.unlock();
            document.getElementById('screen-msg').style.display = 'flex';
            document.getElementById('status-text').innerText = "CAÍDO EN COMBATE";
        }
    };

    // --- ESCENA Y MOTOR ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 1, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.
