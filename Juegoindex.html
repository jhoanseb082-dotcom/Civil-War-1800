<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Civil War 1861 - PRO</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; }
#menu {
position:absolute; width:100%; height:100%;
background:rgba(0,0,0,0.85);
display:flex; flex-direction:column; justify-content:center; align-items:center;
color:white;
}
button { padding:15px; margin:10px; font-size:18px; cursor:pointer; }
#hud { position:absolute; bottom:20px; left:20px; color:white; display:none; }
#crosshair {
position:absolute; top:50%; left:50%;
width:10px; height:10px;
border:2px solid white;
transform:translate(-50%,-50%);
display:none;
}
#message {
position:absolute; top:40%; width:100%;
text-align:center; font-size:30px; color:white;
}
</style>
</head>

<body>

<div id="menu">
<h1>CIVIL WAR 1861</h1>
<button onclick="start(false)">Nueva partida</button>
<button onclick="start(true)">Continuar</button>
</div>

<div id="hud">
<div id="hp">SALUD: 100%</div>
<div id="ammo">FUSIL: LISTO</div>
<div id="mission">MISIÓN 1</div>
</div>

<div id="crosshair"></div>
<div id="message"></div>

<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

<script type="module">

import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

let scene, camera, renderer, controls;
let loader = new GLTFLoader();
let clock = new THREE.Clock();

let player = { hp:100, ammo:1, level:1 };
let enemies = [];
let running = false;

let moveF=false, moveB=false, moveL=false, moveR=false;

let shootSound;

// --- INICIO ---
window.start = function(load){

if(load){
let save = JSON.parse(localStorage.getItem("save"));
if(save) player = save;
}

document.getElementById("menu").style.display="none";
document.getElementById("hud").style.display="block";
document.getElementById("crosshair").style.display="block";

controls.lock();
running = true;

spawnEnemies();
initAudio();
}

// --- ESCENA ---
function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb,10,100);

camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight,0.1,1000);
camera.position.y = 1.7;

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// luz
let light = new THREE.DirectionalLight(0xffffff,1.5);
light.position.set(10,20,10);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

// suelo
let ground = new THREE.Mesh(
new THREE.PlaneGeometry(300,300),
new THREE.MeshStandardMaterial({color:0x3d4d2d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// controles
controls = new PointerLockControls(camera, document.body);

setupInput();
animate();
}

// --- INPUT ---
function setupInput(){

document.addEventListener("keydown", e=>{
if(e.code==="KeyW") moveF=true;
if(e.code==="KeyS") moveB=true;
if(e.code==="KeyA") moveL=true;
if(e.code==="KeyD") moveR=true;
});

document.addEventListener("keyup", e=>{
if(e.code==="KeyW") moveF=false;
if(e.code==="KeyS") moveB=false;
if(e.code==="KeyA") moveL=false;
if(e.code==="KeyD") moveR=false;
});

document.addEventListener("mousedown", shoot);
}

// --- ENEMIGOS ---
const MODEL = 'https://threejs.org/examples/models/gltf/Soldier.glb';

function spawnEnemies(){

enemies.forEach(e=>scene.remove(e.mesh));
enemies = [];

for(let i=0;i<player.level+2;i++){
loader.load(MODEL, g=>{
let s = g.scene;
s.scale.set(1,1,1);
s.position.set(Math.random()*40-20,0,-20-Math.random()*20);
scene.add(s);
enemies.push({mesh:s});
});
}
}

// --- DISPARO ---
function shoot(){

if(!running || !controls.isLocked || player.ammo<=0) return;

player.ammo=0;
document.getElementById("ammo").innerText="RECARGANDO";

if(shootSound) shootSound.play();

let ray = new THREE.Raycaster();
ray.setFromCamera(new THREE.Vector2(),camera);

let objs = enemies.map(e=>e.mesh);
let hit = ray.intersectObjects(objs,true);

if(hit.length>0){

let obj = hit[0].object;
while(obj.parent && !enemies.find(e=>e.mesh===obj)) obj=obj.parent;

let i = enemies.findIndex(e=>e.mesh===obj);

if(i!=-1){
scene.remove(enemies[i].mesh);
enemies.splice(i,1);

if(enemies.length===0){
nextMission();
}
}
}

setTimeout(()=>{
player.ammo=1;
document.getElementById("ammo").innerText="LISTO";
},2000);
}

// --- MISIONES ---
function nextMission(){

player.level++;
saveGame();

showMessage("MISIÓN "+player.level);

spawnEnemies();
controls.lock();
}

// --- GUARDAR ---
function saveGame(){
localStorage.setItem("save", JSON.stringify(player));
}

// --- MENSAJE ---
function showMessage(txt){
let m = document.getElementById("message");
m.innerText = txt;
setTimeout(()=>m.innerText="",2000);
}

// --- AUDIO ---
function initAudio(){

const listener = new THREE.AudioListener();
camera.add(listener);

const audioLoader = new THREE.AudioLoader();
shootSound = new THREE.Audio(listener);

audioLoader.load('https://threejs.org/examples/sounds/shot.wav', buffer=>{
shootSound.setBuffer(buffer);
shootSound.setVolume(0.5);
});
}

// --- LOOP ---
function animate(){
requestAnimationFrame(animate);

if(running && controls.isLocked){

let d = clock.getDelta();
let sp = 10*d;

if(moveF) controls.moveForward(sp);
if(moveB) controls.moveForward(-sp);
if(moveL) controls.moveRight(-sp);
if(moveR) controls.moveRight(sp);

// IA
enemies.forEach(e=>{
let dir = new THREE.Vector3().subVectors(camera.position,e.mesh.position).normalize();
e.mesh.position.addScaledVector(dir,0.02);

if(e.mesh.position.distanceTo(camera.position)<1.5){
player.hp-=0.2;
document.getElementById("hp").innerText="SALUD: "+Math.ceil(player.hp)+"%";
if(player.hp<=0) location.reload();
}
});
}

renderer.render(scene,camera);
}

init();

</script>
</body>
</html>
